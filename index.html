<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTrack - Registro de Lectura</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1410">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BookTrack">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-grad-1: #1a1410;
            --bg-grad-2: #2b1f17;
            --text-main: #ede4d3;
            --text-dim: #9c8f7a;
            --text-faint: #6b6155;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-bg-hover: rgba(255, 255, 255, 0.05);
            --card-border: rgba(214, 158, 92, 0.25);
            --input-bg: rgba(255, 255, 255, 0.05);
            --modal-bg-1: #1a1410;
            --modal-bg-2: #2b1f17;
            --accent-1: #d69e5c;
            --accent-2: #a8577a;
            --green: #6fae7c;
            --white: #fff;
        }

        body.light {
            --bg-grad-1: #faf6ee;
            --bg-grad-2: #f0e6d4;
            --text-main: #322718;
            --text-dim: #7a6a52;
            --text-faint: #a3937a;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-bg-hover: rgba(255, 255, 255, 0.9);
            --card-border: rgba(180, 120, 60, 0.3);
            --input-bg: rgba(255, 255, 255, 0.75);
            --modal-bg-1: #ffffff;
            --modal-bg-2: #faf6ee;
            --accent-1: #b5722a;
            --accent-2: #8a3f5f;
            --green: #3f8a52;
            --white: #322718;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            animation: slideDown 0.6s ease-out;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: inherit;
        }

        .theme-toggle:hover {
            background: var(--card-bg-hover);
            transform: scale(1.05);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: var(--card-bg-hover);
            border-color: var(--accent-1);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 30px;
            font-weight: 900;
            color: var(--accent-1);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-size: 16px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .filter-tab {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .filter-tab.active {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            color: #fff;
            border-color: transparent;
        }

        .goal-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .goal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
        }

        .goal-title span {
            color: var(--accent-1);
        }

        .goal-set-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .goal-set-row input {
            width: 80px;
        }

        .goal-progress-text {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .goal-progress-text strong {
            color: var(--accent-1);
            font-size: 16px;
        }

        .goal-bar-wrap {
            height: 10px;
            background: rgba(128,128,128,0.2);
            border-radius: 6px;
            overflow: hidden;
        }

        .goal-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .goal-bar-fill.complete {
            background: var(--green);
        }

        .goal-complete-msg {
            font-size: 12px;
            color: var(--green);
            font-weight: 700;
            margin-top: 8px;
        }

        .add-book-form {
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1.4fr 1.2fr 0.7fr 0.7fr auto;
            gap: 10px;
            align-items: end;
        }

        input[type="text"],
        input[type="number"] {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 13px;
            font-family: inherit;
            transition: all 0.3s ease;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 10px rgba(214, 158, 92, 0.25);
        }

        input::placeholder {
            color: var(--text-faint);
        }

        .field-label {
            font-size: 10px;
            color: var(--text-faint);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .btn-add {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(214, 158, 92, 0.3);
        }

        .search-row {
            margin-bottom: 20px;
        }

        .search-row input {
            font-size: 14px;
            padding: 12px 16px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 15px;
            margin-bottom: 35px;
        }

        .book-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .book-card.finished {
            border-color: var(--green);
            background: rgba(111, 174, 124, 0.08);
        }

        .book-card:hover {
            transform: translateY(-3px);
        }

        .book-status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .badge-reading {
            background: rgba(214, 158, 92, 0.2);
            color: var(--accent-1);
            border: 1px solid rgba(214, 158, 92, 0.4);
        }

        .badge-finished {
            background: rgba(111, 174, 124, 0.2);
            color: var(--green);
            border: 1px solid rgba(111, 174, 124, 0.4);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .progress-pages {
            font-size: 12px;
            color: var(--text-dim);
        }

        .progress-pct {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-1);
        }

        .book-card.finished .progress-pct {
            color: var(--green);
        }

        .progress-bar-wrap {
            height: 8px;
            background: rgba(128,128,128,0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        .book-card.finished .progress-bar-fill {
            background: var(--green);
        }

        .page-update-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .page-update-row input {
            flex: 1;
        }

        .btn {
            padding: 9px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .btn-update {
            background: rgba(214, 158, 92, 0.15);
            color: var(--accent-1);
            border: 1px solid rgba(214, 158, 92, 0.35);
        }

        .btn-update:hover {
            background: rgba(214, 158, 92, 0.3);
        }

        textarea {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 12px;
            font-family: inherit;
            width: 100%;
            resize: vertical;
            min-height: 50px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 10px rgba(214, 158, 92, 0.25);
        }

        textarea::placeholder {
            color: var(--text-faint);
        }

        .book-top-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            padding-right: 70px;
        }

        .book-cover {
            width: 56px;
            height: 78px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(128,128,128,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-cover-placeholder {
            font-size: 22px;
            opacity: 0.5;
        }

        .book-top-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .book-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }

        .book-author {
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
        }

        .photo-upload-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed var(--card-border);
        }

        .photo-preview-wrap {
            width: 50px;
            height: 68px;
            border-radius: 6px;
            border: 1px dashed var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(128,128,128,0.1);
        }

        .photo-preview-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-preview-wrap span {
            font-size: 18px;
            opacity: 0.5;
        }

        .btn-photo {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 11px;
            color: var(--text-main);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            margin-right: 6px;
            transition: all 0.25s ease;
        }

        .btn-photo:hover {
            background: var(--card-bg-hover);
        }

        .btn-photo-remove {
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.35);
        }

        .book-actions {
            display: flex;
            gap: 8px;
        }

        .btn-finish {
            flex: 1;
            background: rgba(111, 174, 124, 0.15);
            color: var(--green);
            border: 1px solid rgba(111, 174, 124, 0.35);
        }

        .btn-finish:hover {
            background: rgba(111, 174, 124, 0.3);
        }

        .btn-delete {
            flex: 1;
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .btn-delete:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-faint);
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 10px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
            .books-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .logo { font-size: 24px; }
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: rgba(255, 59, 48, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <div class="logo">📖 BOOKTRACK</div>
                <div class="tagline">Tu registro de lectura y avance</div>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo oscuro</button>
        </header>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="totalBooks">0</div>
                <div class="stat-label">Libros totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="finishedBooks">0</div>
                <div class="stat-label">Terminados</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="readingBooks">0</div>
                <div class="stat-label">Leyendo ahora</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPages">0</div>
                <div class="stat-label">Páginas leídas</div>
            </div>
        </div>

        <div class="goal-section">
            <div class="goal-header">
                <div class="goal-title">🎯 Meta de lectura <span id="goalYear"></span></div>
                <div class="goal-set-row">
                    <input type="number" id="goalInput" placeholder="Libros" min="1">
                    <button class="btn-add" onclick="setGoal()">Guardar meta</button>
                </div>
            </div>
            <div id="goalDisplay"></div>
        </div>

        <div class="add-book-form">
            <div class="form-row">
                <div>
                    <span class="field-label">Título</span>
                    <input type="text" id="bookTitle" placeholder="ej: Cien años de soledad">
                </div>
                <div>
                    <span class="field-label">Autor</span>
                    <input type="text" id="bookAuthor" placeholder="ej: Gabriel García Márquez">
                </div>
                <div>
                    <span class="field-label">Total páginas</span>
                    <input type="number" id="bookPages" placeholder="Páginas" min="1">
                </div>
                <div>
                    <span class="field-label">Página actual</span>
                    <input type="number" id="bookCurrentPage" placeholder="0" min="0" value="0">
                </div>
                <button class="btn-add" onclick="addBook()">Agregar</button>
            </div>
            <div class="photo-upload-row">
                <div class="photo-preview-wrap" id="photoPreviewWrap" onclick="document.getElementById('bookPhotoInput').click()">
                    <img id="photoPreviewImg" style="display:none;">
                    <span id="photoPreviewIcon">📷</span>
                </div>
                <div>
                    <span class="field-label">Portada (opcional)</span>
                    <input type="file" id="bookPhotoInput" accept="image/*" onchange="previewPhoto(event)" style="display:none;">
                    <button class="btn-photo" onclick="document.getElementById('bookPhotoInput').click()">Elegir foto</button>
                    <button class="btn-photo btn-photo-remove" id="removePhotoBtn" style="display:none;" onclick="removePhotoPreview()">Quitar</button>
                </div>
            </div>
        </div>

        <div class="section-title">
            <span>Tu biblioteca</span>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">Todos</button>
                <button class="filter-tab" data-filter="reading" onclick="setFilter('reading')">Leyendo</button>
                <button class="filter-tab" data-filter="finished" onclick="setFilter('finished')">Terminados</button>
            </div>
        </div>

        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por título o autor..." oninput="setSearch(this.value)">
        </div>

        <div id="booksContainer" class="books-grid"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>No hay libros registrados aún.</p>
            <p>¡Agrega tu primer libro arriba para empezar tu biblioteca! 📚</p>
        </div>
    </div>

    <button class="reset-btn" onclick="resetData()">Resetear todo</button>

    <button class="reset-btn" onclick="resetData()">Resetear todo</button>

    <script>
        let state = {
            books: [],
            theme: 'dark',
            goals: {}
        };
        let currentFilter = 'all';
        let searchQuery = '';
        let pendingPhoto = null;

        function currentYear() {
            return new Date().getFullYear();
        }

        function loadData() {
            const saved = localStorage.getItem('booktrack-data');
            if (saved) {
                state = JSON.parse(saved);
                if (!state.theme) state.theme = 'dark';
                if (!state.goals) state.goals = {};
            }
            applyTheme();
            render();
        }

        function saveData() {
            localStorage.setItem('booktrack-data', JSON.stringify(state));
        }

        function applyTheme() {
            if (state.theme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeBtn').textContent = '☀️ Modo claro';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeBtn').textContent = '🌙 Modo oscuro';
            }
        }

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            applyTheme();
            saveData();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            render();
        }

        function setSearch(value) {
            searchQuery = value.trim().toLowerCase();
            render();
        }

        function previewPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 3 * 1024 * 1024) {
                alert('La imagen es muy grande. Usa una foto de menos de 3MB.');
                event.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingPhoto = e.target.result;
                document.getElementById('photoPreviewImg').src = pendingPhoto;
                document.getElementById('photoPreviewImg').style.display = 'block';
                document.getElementById('photoPreviewIcon').style.display = 'none';
                document.getElementById('removePhotoBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }

        function removePhotoPreview() {
            pendingPhoto = null;
            document.getElementById('bookPhotoInput').value = '';
            document.getElementById('photoPreviewImg').style.display = 'none';
            document.getElementById('photoPreviewIcon').style.display = 'inline';
            document.getElementById('removePhotoBtn').style.display = 'none';
        }

        function addBook() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const totalPages = parseInt(document.getElementById('bookPages').value);
            let currentPage = parseInt(document.getElementById('bookCurrentPage').value) || 0;

            if (!title || !author) {
                alert('Ingresa título y autor');
                return;
            }
            if (!totalPages || totalPages <= 0) {
                alert('Ingresa el número total de páginas');
                return;
            }
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 0) currentPage = 0;

            state.books.push({
                id: Date.now(),
                title,
                author,
                totalPages,
                currentPage,
                finished: currentPage >= totalPages,
                addedDate: new Date().toISOString(),
                photo: pendingPhoto
            });

            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookPages').value = '';
            document.getElementById('bookCurrentPage').value = '0';
            removePhotoPreview();

            saveData();
            render();
        }

        function updatePage(bookId) {
            const input = document.getElementById(`pageInput-${bookId}`);
            let newPage = parseInt(input.value);
            const book = state.books.find(b => b.id === bookId);
            if (!book) return;

            if (isNaN(newPage) || newPage < 0) newPage = 0;
            if (newPage > book.totalPages) newPage = book.totalPages;

            book.currentPage = newPage;
            const wasFinished = book.finished;
            book.finished = newPage >= book.totalPages;
            if (book.finished && !wasFinished) book.finishedDate = new Date().toISOString();

            saveData();
            render();
        }

        function toggleFinished(bookId) {
            const book = state.books.find(b => b.id === bookId);
            if (!book) return;
            book.finished = !book.finished;
            if (book.finished) {
                book.currentPage = book.totalPages;
                book.finishedDate = new Date().toISOString();
            } else {
                book.finishedDate = null;
            }
            saveData();
            render();
        }

        function setGoal() {
            const year = currentYear();
            const value = parseInt(document.getElementById('goalInput').value);
            if (!value || value <= 0) {
                alert('Ingresa un número válido de libros');
                return;
            }
            state.goals[year] = value;
            document.getElementById('goalInput').value = '';
            saveData();
            renderGoal();
        }

        function renderGoal() {
            const year = currentYear();
            document.getElementById('goalYear').textContent = year;
            const goal = state.goals[year];
            const display = document.getElementById('goalDisplay');

            const finishedThisYear = state.books.filter(b => {
                if (!b.finished || !b.finishedDate) return false;
                return new Date(b.finishedDate).getFullYear() === year;
            }).length;

            if (!goal) {
                display.innerHTML = `<div class="goal-progress-text">Aún no has definido una meta para ${year}. ¡Ponte una arriba! 📖</div>`;
                document.getElementById('goalInput').placeholder = 'ej: 24';
                return;
            }

            const pct = Math.min(100, Math.round((finishedThisYear / goal) * 100));
            const complete = finishedThisYear >= goal;

            display.innerHTML = `
                <div class="goal-progress-text"><strong>${finishedThisYear}</strong> de ${goal} libros terminados en ${year}</div>
                <div class="goal-bar-wrap">
                    <div class="goal-bar-fill ${complete ? 'complete' : ''}" style="width: ${pct}%"></div>
                </div>
                ${complete ? '<div class="goal-complete-msg">🎉 ¡Meta cumplida! Puedes ajustarla si quieres seguir más alto.</div>' : ''}
            `;
            document.getElementById('goalInput').placeholder = `Actual: ${goal}`;
        }

        function deleteBook(bookId) {
            if (confirm('¿Eliminar este libro de tu registro?')) {
                state.books = state.books.filter(b => b.id !== bookId);
                saveData();
                render();
            }
        }

        function render() {
            // Migración: libros ya marcados como terminados sin fecha registrada
            state.books.forEach(b => {
                if (b.finished && !b.finishedDate) {
                    b.finishedDate = b.addedDate || new Date().toISOString();
                }
            });

            renderGoal();

            const total = state.books.length;
            const finished = state.books.filter(b => b.finished).length;
            const reading = total - finished;
            const totalPagesRead = state.books.reduce((sum, b) => sum + (b.finished ? b.totalPages : b.currentPage), 0);

            document.getElementById('totalBooks').textContent = total;
            document.getElementById('finishedBooks').textContent = finished;
            document.getElementById('readingBooks').textContent = reading;
            document.getElementById('totalPages').textContent = totalPagesRead;

            let filtered = state.books;
            if (currentFilter === 'reading') filtered = filtered.filter(b => !b.finished);
            if (currentFilter === 'finished') filtered = filtered.filter(b => b.finished);
            if (searchQuery) {
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(searchQuery) ||
                    b.author.toLowerCase().includes(searchQuery)
                );
            }

            const container = document.getElementById('booksContainer');
            container.innerHTML = '';

            if (filtered.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                let msg = 'No hay libros registrados aún.';
                if (total > 0 && searchQuery) msg = `Sin resultados para "${searchQuery}".`;
                else if (total > 0) msg = 'No hay libros en esta categoría.';
                document.getElementById('emptyState').querySelector('p').textContent = msg;
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }

            filtered.slice().reverse().forEach(book => {
                const pct = Math.round((book.currentPage / book.totalPages) * 100);
                const card = document.createElement('div');
                card.className = `book-card ${book.finished ? 'finished' : ''}`;

                card.innerHTML = `
                    <div class="book-status-badge ${book.finished ? 'badge-finished' : 'badge-reading'}">
                        ${book.finished ? '✓ Terminado' : 'Leyendo'}
                    </div>
                    <div class="book-top-row">
                        <div class="book-cover">
                            ${book.photo ? `<img src="${book.photo}" alt="Portada">` : '<span class="book-cover-placeholder">📖</span>'}
                        </div>
                        <div class="book-top-info">
                            <div class="book-title">${escapeHtml(book.title)}</div>
                            <div class="book-author">${escapeHtml(book.author)}</div>
                        </div>
                    </div>
                    <div class="progress-info">
                        <div class="progress-pages">Pág. ${book.currentPage} de ${book.totalPages}</div>
                        <div class="progress-pct">${pct}%</div>
                    </div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" style="width: ${pct}%"></div>
                    </div>
                    <div class="page-update-row">
                        <input type="number" id="pageInput-${book.id}" placeholder="Nueva página" min="0" max="${book.totalPages}" value="${book.currentPage}">
                        <button class="btn btn-update" onclick="updatePage(${book.id})">Actualizar</button>
                    </div>
                    <div class="book-actions">
                        <button class="btn btn-finish" onclick="toggleFinished(${book.id})">
                            ${book.finished ? 'Marcar en curso' : 'Marcar terminado'}
                        </button>
                        <button class="btn btn-delete" onclick="deleteBook(${book.id})">Eliminar</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function resetData() {
            if (confirm('⚠️ Esto eliminará todos tus libros registrados. ¿Estás seguro?')) {
                localStorage.clear();
                removePhotoPreview();
                currentFilter = 'all';
                searchQuery = '';
                document.getElementById('searchInput').value = '';
                document.querySelectorAll('.filter-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.filter === 'all');
                });
                state = { books: [], theme: state.theme, goals: {} };
                render();
            }
        }

        loadData();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
